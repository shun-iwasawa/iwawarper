name: Windows Build

on:
  push:
    branches:
      - master  # Specify branches where the workflow should run
    paths:
      - '**/*'                                    # Include all files in the repository
      - '!README.md'                              # Exclude README
      - '!doc/**'                                 # Exclude documentation
      - '!**/.github/**'                          # Exclude everything in .github folder
      - '.github/workflows/workflow_windows.yml'  # Include Windows workflow file
  pull_request:
    paths:
      - '**/*'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_windows.yml'

jobs:
  Windows:
    runs-on: windows-2022
    env:
      # QT related variable
      QT_PATH: ${{ github.workspace }}\thirdparty\qt\5.15.2_wintab\msvc2019_64  # Path to custom Qt
      
      # Visual Studio related variables
      MSVCVERSION: "Visual Studio 17 2022"  # Visual Studio version

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: actions/cache@v5
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-${{ env.vcpkg_ref }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-vcpkg-${{ env.vcpkg_ref }}-

      # Install custom Qt 5.15.2 with WinTab support
      - name: Install custom Qt 5.15.2 with WinTab support
        run: |
          @echo on
          mkdir thirdparty\qt
          curl -fsSL -o Qt5.15.2_wintab.zip https://github.com/shun-iwasawa/qt5/releases/download/v5.15.2_wintab/Qt5.15.2_wintab.zip
          7z x Qt5.15.2_wintab.zip
          move Qt5.15.2_wintab\5.15.2_wintab thirdparty\qt
        shell: cmd

      - name: Install third-party prebuilt libs (LFS workaround)
        run: |
          @echo on
          curl -fsSL -o thirdparty-libs.zip https://github.com/shun-iwasawa/iwawarper_thirdparty_libs/releases/download/prebuilt-libs-v1/thirdparty-libs.zip
          7z x -y thirdparty-libs.zip
        shell: cmd    

      # Add msbuild to PATH for build process
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: CMake configuration
        run: |
          rmdir /S /Q build
          mkdir build
          cd build
          cmake ..\sources -G "%MSVCVERSION%" -Ax64 -DQTDIR="%QT_PATH%"
        shell: cmd
        
      # Build IwaWarper using MSBuild
      - name: Build IwaWarper
        run: |
          @echo on
          cd build
          msbuild /p:Configuration=Release /m /verbosity:minimal ALL_BUILD.vcxproj
        shell: cmd

      - name: Create Artifact
        env:
          VCINSTALLDIR: 'C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC'
        run: |
          @echo on
          mkdir artifact
          cd artifact
          xcopy /Y /E /I ..\stuff stuff
          mkdir IwaWarper
          dir /B ..\build
          copy /Y ..\build\Release\*.* IwaWarper
          copy /Y ..\thirdparty\OpenToonz\bin\*.* IwaWarper
          copy /Y ..\thirdparty\glut\3.7.6\lib\glut64.dll IwaWarper
          copy /Y ..\.github\workflows\conf.ini IwaWarper
          "%QT_PATH%\bin\windeployqt.exe" IwaWarper\IwaWarper.exe
        shell: cmd

      - uses: actions/upload-artifact@v6
        with:
          name: IwaWarper-${{ runner.os }}-${{ github.sha }}
          path: artifact
